name: Deploy Tracking System Backend to HF

# Trigger - When you push files in branch main, and the files being added to backend folder.
on:
  push:
    branches: [main]
    # paths:
    # - "backend/**"  # Only push when this folder being modified
    # - ai/**  # Track also ai folder and update based on it

# Job - the machine or env to run this code.
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest pytest-asyncio numpy pydantic opencv-python

      - name: Run unit test
        # python -m here is most important, it let imports works as on PC. this fix imports issue
        run: python -m pytest backend/tests

  deploy:
    needs: test # Defined previously
    runs-on: ubuntu-latest

    # steps - Download repo code into machine to work with.
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # - fetch full git history

      - name: Push backend to HF
        env:
          HF_TOKEN: ${{secrets.HF_TOKEN}}

        run: |
          git config --global user.email "deploy@github.com"
          git config --global user.name "Github Actions"
          git remote add space https://e1250:$HF_TOKEN@huggingface.co/spaces/e1250/tracking_system_backend

          git subtree split --prefix=backend -b deploy_branch
          git push space deploy_branch:main --force
